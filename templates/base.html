<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Shriyansh Pattanayak{% endblock %}</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Fonts: Syne (display) + DM Sans (body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet" />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />

    <!-- Tailwind config — extend with brand tokens -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bg:      '#0a0a0a',   /* near-black background */
                        surface: '#111111',   /* card / elevated surfaces */
                        border:  '#1e1e1e',   /* subtle dividers */
                        muted:   '#3a3a3a',   /* disabled / placeholder */
                        text:    '#e8e8e8',   /* primary text */
                        dim:     '#888888',   /* secondary / caption text */
                        accent:  '#4ade80',   /* bioluminescent green accent */
                        accentDim: '#166534', /* dark green for hover fills */
                    },
                    fontFamily: {
                        display: ['Syne', 'sans-serif'],
                        body:    ['DM Sans', 'sans-serif'],
                    },
                }
            }
        }
    </script>
</head>

<body class="bg-bg text-text font-body antialiased min-h-screen flex flex-col">

    <!-- ================================================================
         NAVIGATION BAR
         Fixed top nav with site name on the left and page links on the right.
         Active page link is highlighted with the accent color.
    ================================================================ -->
    <nav class="fixed top-0 left-0 right-0 z-50 nav-blur border-b border-border">
        <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">

            <!-- Logo / Name -->
            <a href="{{ url_for('home') }}" class="font-display font-bold text-lg tracking-tight hover:text-accent transition-colors duration-200">
                SP<span class="text-accent">.</span>
            </a>

            <!-- Desktop nav links -->
            <ul class="hidden md:flex items-center gap-8 text-sm font-body font-medium">
                <li><a href="{{ url_for('home') }}"     class="nav-link {% if request.endpoint == 'home'     %}active{% endif %}">Home</a></li>
                <li><a href="{{ url_for('about') }}"    class="nav-link {% if request.endpoint == 'about'    %}active{% endif %}">About</a></li>
                <li><a href="{{ url_for('projects') }}" class="nav-link {% if request.endpoint == 'projects' %}active{% endif %}">Projects</a></li>
                <li><a href="{{ url_for('skills') }}"   class="nav-link {% if request.endpoint == 'skills'   %}active{% endif %}">Skills</a></li>
                <li><a href="{{ url_for('sports') }}"   class="nav-link {% if request.endpoint == 'sports'   %}active{% endif %}">Sports</a></li>
                <li>
                    <a href="{{ url_for('contact') }}" class="border border-accent text-accent px-4 py-1.5 rounded-full text-sm hover:bg-accent hover:text-bg transition-all duration-200 font-medium">
                        Contact
                    </a>
                </li>
            </ul>

            <!-- Mobile hamburger (functional via JS) -->
            <button id="mobile-menu-btn" class="md:hidden text-dim hover:text-text transition-colors" aria-label="Toggle menu">
                <svg id="icon-open" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 6h16M4 12h16M4 18h16"/>
                </svg>
                <svg id="icon-close" class="w-6 h-6 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
        </div>

        <!-- Mobile dropdown menu -->
        <div id="mobile-menu" class="hidden md:hidden border-t border-border bg-bg">
            <ul class="flex flex-col px-6 py-4 gap-4 text-sm font-medium">
                <li><a href="{{ url_for('home') }}"     class="block hover:text-accent transition-colors">Home</a></li>
                <li><a href="{{ url_for('about') }}"    class="block hover:text-accent transition-colors">About</a></li>
                <li><a href="{{ url_for('projects') }}" class="block hover:text-accent transition-colors">Projects</a></li>
                <li><a href="{{ url_for('skills') }}"   class="block hover:text-accent transition-colors">Skills</a></li>
                <li><a href="{{ url_for('sports') }}"   class="block hover:text-accent transition-colors">Sports</a></li>
                <li><a href="{{ url_for('contact') }}"  class="block hover:text-accent transition-colors">Contact</a></li>
            </ul>
        </div>
    </nav>

    <!-- ================================================================
         MAIN CONTENT — each page injects its own content here
    ================================================================ -->
    <main class="flex-1 pt-16">
        {% block content %}{% endblock %}
    </main>

    <!-- ================================================================
         FOOTER
    ================================================================ -->
    <footer class="border-t border-border mt-24">
        <div class="max-w-6xl mx-auto px-6 py-8 flex flex-col md:flex-row items-center justify-between gap-4 text-dim text-sm">
            <span class="font-display font-semibold text-text">Shriyansh Pattanayak<span class="text-accent">.</span></span>
            <span>Biology × AI × Track — Doha, Qatar</span>
            <div class="flex items-center gap-5">
                <!-- GitHub -->
                <a href="https://github.com/Shriyansh-24" target="_blank" rel="noopener" class="hover:text-accent transition-colors" aria-label="GitHub">
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"/>
                    </svg>
                </a>
                <!-- LinkedIn -->
                <a href="https://linkedin.com/in/shriyansh-pattanayak" target="_blank" rel="noopener" class="hover:text-accent transition-colors" aria-label="LinkedIn">
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
                    </svg>
                </a>
                <!-- Email -->
                <a href="mailto:shriyansh@example.com" class="hover:text-accent transition-colors" aria-label="Email">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                    </svg>
                </a>
            </div>
        </div>
    </footer>

    <!-- Global JS -->
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
